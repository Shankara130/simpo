# simpo Development Infrastructure
# PostgreSQL and Redis services for local development
#
# Usage:
#   docker-compose up -d          # Start services
#   docker-compose ps             # Check status
#   docker-compose logs postgres  # View PostgreSQL logs
#   docker-compose logs redis     # View Redis logs
#   docker-compose down           # Stop services
#   docker-compose down -v        # Stop and remove volumes (WARNING: deletes data)

services:
  postgres:
    image: postgres:14-alpine
    container_name: simpo-postgres
    environment:
      POSTGRES_DB: simpo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - simpo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - simpo_network

  redis:
    image: redis:7-alpine
    container_name: simpo-redis
    ports:
      - "6379:6379"
    volumes:
      - simpo_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - simpo_network

networks:
  simpo_network:
    driver: bridge

volumes:
  simpo_postgres_data:
  simpo_redis_data:

        type: integer
      info:
        type: integer
      total:
        type: integer
      warning:
        type: integer
    type: object
  dto.BackupConfig:
    properties:
      enabled:
        example: true
        type: boolean
      retention_days:
        example: 30
        type: integer
      schedule:
        description: Cron expression
        example: 0 2 * * *
        type: string
      storage_path:
        example: /backups
        type: string
    type: object
  dto.BackupInfo:
    properties:
      checksum:
        type: string
      created_at:
        type: string
      description:
        type: string
      duration_seconds:
        type: integer
      filename:
        type: string
      size:
        type: integer
      status:
        $ref: '#/definitions/dto.BackupStatus'
    type: object
  dto.BackupJobStatus:
    properties:
      current_backup:
        type: string
      is_running:
        type: boolean
      last_backup:
        type: string
      last_status:
        $ref: '#/definitions/dto.BackupStatus'
      next_backup:
        type: string
      success_rate:
        description: Percentage
        type: number
    type: object
  dto.BackupListResponse:
    properties:
      backups:
        items:
          $ref: '#/definitions/dto.BackupInfo'
        type: array

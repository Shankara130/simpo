  whitelist.AddWhitelistEntryRequest:
    properties:
      default_role:
        description: |-
          DefaultRole is the default role assigned to users registering with this domain
          Required: true
          Enum: SYSTEM_ADMIN, OWNER, CASHIER
          Example: "CASHIER"
        enum:
        - SYSTEM_ADMIN
        - OWNER
        - CASHIER
        example: CASHIER
        type: string

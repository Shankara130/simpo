host: localhost:8080
info:
  contact:
    email: support@simpo.com
    name: API Support
  description: API for simpo pharmacy management system supporting POS, inventory,
    reporting, and multi-branch operations.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://simpo.com/terms
  title: simpo Pharmacy Management System API
  version: "1.0"
paths:
  /api/v1/admin/audit/retention/cleanup:
    post:
      consumes:
      - application/json
      description: |-
        Deletes audit logs older than 5 years with optional backup (Story 6.4, AC6)
        CRITICAL: This operation permanently deletes audit logs. Use with caution.
      parameters:
      - description: Cleanup request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CleanupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Cleanup executed successfully
          schema:
            $ref: '#/definitions/handlers.CleanupResponse'
        "400":
          description: Invalid request or not confirmed
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - SYSTEM_ADMIN only
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Execute audit log retention cleanup
      tags:
      - Audit Log Management
  /api/v1/admin/audit/retention/status:
    get:
      consumes:
      - application/json
      description: Returns information about audit logs eligible for cleanup (Story
        6.4, AC6)
      produces:
      - application/json
      responses:
        "200":
          description: Retention status retrieved
          schema:
            $ref: '#/definitions/handlers.GetRetentionStatusResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - SYSTEM_ADMIN only
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get audit log retention status
      tags:
      - Audit Log Management
  /api/v1/admin/backups:
    get:
      consumes:
      - application/json
      description: Returns list of all available backups with metadata (Story 6.3,
        AC5)
      produces:
      - application/json
      responses:
        "200":
          description: Backups retrieved successfully
          schema:
            $ref: '#/definitions/dto.BackupListResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - Admin only
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List all backups
      tags:
      - Admin Backups
    post:
      consumes:
      - application/json
      description: Manually triggers a database backup operation (Story 6.3, AC5)
      parameters:
      - description: Backup request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateBackupRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Backup started
          schema:
            $ref: '#/definitions/dto.CreateBackupResponse'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - Admin only
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Backup already in progress
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Trigger manual backup
      tags:
      - Admin Backups
  /api/v1/admin/backups/{filename}:
    delete:
      consumes:
      - application/json
      description: Manually deletes the specified backup file (Story 6.3, Task 4)
      parameters:
      - description: Backup filename
        in: path
        name: filename
        required: true
        type: string
      - description: Delete confirmation
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.DeleteBackupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Backup deleted
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - Admin only
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Backup not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete backup file
      tags:
      - Admin Backups
    get:
      consumes:
      - application/json
      description: Downloads the specified backup file (Story 6.3, AC5)
      parameters:
      - description: Backup filename
        in: path
        name: filename
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: Backup file
          schema:
            type: file
        "400":
          description: Invalid filename
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - Admin only
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Backup not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Download backup file
      tags:
      - Admin Backups
  /api/v1/admin/backups/{filename}/restore:
    post:
      consumes:
      - application/json
      description: Restores database from the specified backup file (Story 6.3, AC6)
      parameters:
      - description: Backup filename
        in: path
        name: filename
        required: true
        type: string
      - description: Restore confirmation
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RestoreBackupRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Restore started
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - Admin only
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Backup not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Restore from backup
      tags:
      - Admin Backups
  /api/v1/admin/backups/{filename}/validate:
    get:
      consumes:
      - application/json
      description: Validates the specified backup file for restoration (Story 6.3,
        AC6)
      parameters:
      - description: Backup filename
        in: path
        name: filename
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Backup is valid
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid filename
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - Admin only
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Validate backup file
      tags:
      - Admin Backups
  /api/v1/admin/backups/cleanup:
    post:
      consumes:
      - application/json
      description: Manually triggers cleanup of backups older than retention period
        (Story 6.3, AC3)
      parameters:
      - description: "30"
        in: query
        name: retention_days
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Cleanup completed
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - Admin only
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Cleanup old backups
      tags:
      - Admin Backups
  /api/v1/admin/backups/config:
    get:
      consumes:
      - application/json
      description: Returns current backup configuration (Story 6.3, AC8)
      produces:
      - application/json
      responses:
        "200":
          description: Backup configuration
          schema:
            $ref: '#/definitions/dto.BackupConfig'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - Admin only
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get backup configuration
      tags:
      - Admin Backups
    put:
      consumes:
      - application/json
      description: Updates backup configuration settings (Story 6.3, AC8)
      parameters:
      - description: Backup configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BackupConfig'
      produces:
      - application/json
      responses:
        "200":
          description: Configuration updated
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - Admin only
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update backup configuration
      tags:
      - Admin Backups
  /api/v1/admin/backups/status:
    get:
      consumes:
      - application/json
      description: Returns current backup job status and statistics (Story 6.3, AC4)
      produces:
      - application/json
      responses:
        "200":
          description: Backup status retrieved
          schema:
            $ref: '#/definitions/dto.BackupJobStatus'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - Admin only
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get backup status
      tags:
      - Admin Backups
  /api/v1/admin/branches:
    post:
      consumes:
      - application/json
      description: Creates a new pharmacy branch with audit logging (Story 6.4, AC1,
        AC2)
      parameters:
      - description: Branch creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateBranchRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Branch created successfully
          schema:
            $ref: '#/definitions/handlers.CreateBranchResponse'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - OWNER/ADMIN only
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Branch name already exists
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create new branch
      tags:
      - Branch Management
  /api/v1/admin/branches/{branch_id}:
    delete:
      consumes:
      - application/json
      description: Deactivates a pharmacy branch with audit logging (Story 6.4, AC1,
        AC2)
      parameters:
      - description: Branch ID
        in: path
        name: branch_id
        required: true
        type: integer
      - description: Deactivation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.DeactivateBranchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Branch deactivated successfully
          schema:
            $ref: '#/definitions/handlers.DeactivateBranchResponse'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object

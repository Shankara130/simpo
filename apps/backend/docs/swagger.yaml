  dto.SystemSettingsResponse:
    properties:
      address:
        example: 123 Main St, Jakarta, Indonesia
        type: string
      businessName:
        example: Simpo Pharmacy
        type: string
      email:
        example: admin@simpo.pharmacy
        type: string
      logoUrl:
        example: https://example.com/logo.png
        type: string
      phone:
        example: +62-21-1234-5678
        type: string
      updatedAt:
        example: "2026-05-26T10:30:00Z"

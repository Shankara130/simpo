        example: Jakarta Central
        type: string
      phone:
        description: |-
          Phone is the branch phone number
          Example: "+62-21-1234-5678"
        example: +62-21-1234-5678
        type: string
    type: object
  handlers.DeactivateBranchRequest:
    properties:
      reason:

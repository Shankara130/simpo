        example: Branch closed permanently
        minLength: 5
        type: string
    required:
    - reason
    type: object
  handlers.DeactivateBranchResponse:
    properties:
      deactivated_at:
        description: |-
          DeactivatedAt is the timestamp when branch was deactivated

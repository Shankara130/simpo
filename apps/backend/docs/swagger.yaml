        example: "2021-05-27T00:00:00Z"
        type: string
      eligible_for_cleanup:
        description: EligibleForCleanup is the number of logs older than 5 years
        example: 5000
        type: integer
      estimated_space_reclaimed:
        description: |-
          EstimatedSpaceReclaimed is the estimated disk space that would be reclaimed (in bytes)

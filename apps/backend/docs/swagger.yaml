        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  dto.APIMetrics:
    properties:
      avg_response_time:
        type: string
      requests_per_second:
        type: number
    type: object
  dto.Alert:
    properties:
      message:
        type: string

        $ref: '#/definitions/dto.BackupInfo'
      retention_days:
        type: integer
      total_size:
        type: integer
    type: object
  dto.BackupMetrics:
    properties:
      is_running:
        type: boolean
      last_backup_time:
        description: ISO 8601 format
        type: string
      last_status:
        description: success, failed, pending
        type: string
      next_backup_time:
        description: ISO 8601 format
        type: string
      success_rate:
        description: Percentage (0-100)
        type: number
      total_backups:
        description: Total number of backups
        type: integer
      total_size_bytes:
        description: Total size of all backups
        type: integer
    type: object
  dto.BackupStatus:
    enum:
    - pending
    - running
    - success
    - failed
    - corrupted
    type: string
    x-enum-varnames:
    - BackupStatusPending
    - BackupStatusRunning
    - BackupStatusSuccess
    - BackupStatusFailed
    - BackupStatusCorrupted
  dto.CreateBackupRequest:
    properties:
      description:
        example: Manual backup before system update
        type: string
    type: object
  dto.CreateBackupResponse:
    properties:
      estimated_time:
        example: 2-5 min
        type: string
      filename:
        example: simpo_20260527_143000.dump
        type: string
      message:
        example: Backup operation started
        type: string
      status:
        example: started
        type: string
    type: object
  dto.DatabaseMetrics:
    properties:
      response_time:
        type: string
      status:
        type: string
    type: object
  dto.DeleteBackupRequest:
    properties:
      confirmed:
        example: true
        type: boolean
      reason:
        example: Corrupted backup file
        type: string
    required:
    - confirmed
    - reason
    type: object
  dto.DiskMetrics:
    properties:
      free_percentage:
        type: number
      total_gb:
        type: number
      used_gb:
        type: number
    type: object
  dto.EnhancedHealthDashboardResponse:
    properties:
      alerts:
        items:
          $ref: '#/definitions/dto.Alert'
        type: array
      environment:
        type: string
      metrics:
        $ref: '#/definitions/dto.HealthMetrics'
      status:
        $ref: '#/definitions/dto.HealthStatus'
      timestamp:
        type: string
      uptime:
        type: string
      uptime_percentage:
        type: number
      version:
        type: string
    type: object
  dto.ErrorsMetrics:
    properties:
      count:
        description: Total error count
        type: integer
      rate:
        description: Error rate as percentage
        type: number
      total_requests:
        description: Total request count for rate calculation
        type: integer
    type: object
  dto.HealthMetrics:
    properties:
      api:
        $ref: '#/definitions/dto.APIMetrics'
      backup:
        allOf:
        - $ref: '#/definitions/dto.BackupMetrics'
        description: 'Story 6.3: Backup status metrics'
      database:
        $ref: '#/definitions/dto.DatabaseMetrics'
      disk:
        $ref: '#/definitions/dto.DiskMetrics'
      errors:
        $ref: '#/definitions/dto.ErrorsMetrics'
      redis:
        $ref: '#/definitions/dto.RedisMetrics'
      sessions:
        $ref: '#/definitions/dto.SessionsMetrics'
